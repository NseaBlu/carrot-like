<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canvas 塔防 Demo</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      background: #1a1a1e;
    }

    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }

    #hud {
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
      padding: 0.5rem 0.75rem;
      font-family: system-ui, "Segoe UI", sans-serif;
      font-size: 14px;
      color: #eee;
      background: rgba(15, 18, 28, 0.88);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      pointer-events: auto;
    }

    #hud strong {
      color: #9cf;
      font-weight: 600;
    }

    #hud span.val {
      color: #fff;
      font-variant-numeric: tabular-nums;
    }

    #btn-restart {
      margin-left: auto;
      padding: 0.35rem 0.75rem;
      font-size: 13px;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 6px;
      background: rgba(80, 120, 200, 0.35);
      color: #fff;
    }

    #btn-restart:hover {
      background: rgba(100, 140, 220, 0.5);
    }

    #game {
      position: absolute;
      left: 0;
      right: 0;
      top: 44px;
      bottom: 0;
    }

    canvas#view {
      display: block;
      width: 100%;
      height: 100%;
      vertical-align: middle;
      touch-action: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <header id="hud" aria-label="游戏状态">
      <span>金币 <strong class="val" id="hud-gold">0</strong></span>
      <span>生命 <strong class="val" id="hud-lives">0</strong></span>
      <span>波次 <strong class="val" id="hud-wave">0/0</strong></span>
      <span>状态 <strong class="val" id="hud-phase">进行中</strong></span>
      <button type="button" id="btn-restart">重开</button>
    </header>
    <div id="game">
      <canvas id="view" aria-label="游戏画布"></canvas>
    </div>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
